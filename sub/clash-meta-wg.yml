- name: 🔰 PROXIES
  type: select
  proxies:
  - 🇮🇷 AUTO-IR-ENTRY
  - 🇸🇪 AUTO-SW-DIALER
  - DIRECT
  - SW-DIALER-01
  - SW-DIALER-02
  - SW-DIALER-03
